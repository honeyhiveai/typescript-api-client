# Publishes the TypeScript API client SDK to npm and creates a GitHub Release.
#
# Trust contract: this workflow assumes an upstream sync process has already:
#   - validated the package.json version matches the tag
#   - validated CHANGELOG.md has a "## [version]" entry
#   - atomically pushed both the commit and the tag to main
# As a result, this workflow does NOT re-validate any of those properties.
# If you fork this workflow for a release flow without those guarantees, you
# will need to add corresponding defensive checks.
#
# Uses npm Trusted Publishers (OIDC) — no NPM_TOKEN secret needed. Configure
# the trust relationship on npmjs.com under the package's "Trusted Publisher"
# settings: org=honeyhiveai, repo=typescript-api-client, workflow=publish.yaml.

name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SDK version to publish (e.g. 2.0.0-rc.2)"
        required: true
        type: string
      dry_run:
        description: "Dry run — validate everything without publishing or creating a release"
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

concurrency: publish

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      INPUT_VERSION: ${{ inputs.version }}

    steps:
      # Actions are pinned to commit SHAs (not tags) because this workflow has
      # id-token: write for npm OIDC publishing. A compromised tag on a
      # third-party action could exfiltrate the OIDC token. Update SHAs
      # intentionally; verify the corresponding release on the action's repo
      # before bumping.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          ref: "v${{ inputs.version }}"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # --ignore-scripts: defense in depth. A compromised transitive dep's
      # postinstall would otherwise execute with the OIDC token in env.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Pre-release versions (anything with a hyphen, per semver) publish under
      # the "next" dist-tag and are flagged as pre-releases on GitHub.
      - name: Determine release type
        id: release-type
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$INPUT_VERSION" == *-* ]]; then
            echo "dist_tag=next" >> "$GITHUB_OUTPUT"
            echo "prerelease_flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease_flag=" >> "$GITHUB_OUTPUT"
          fi

      # Authentication is handled via OIDC (Trusted Publishers) — npm CLI
      # auto-detects the OIDC environment. Provenance is generated automatically.
      - name: Publish to npm
        run: |
          npm publish \
            --tag ${{ steps.release-type.outputs.dist_tag }} \
            ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: Extract changelog entry
        shell: bash
        run: |
          set -euo pipefail
          VERSION_RE=$(printf '%s' "$INPUT_VERSION" | sed 's/[.[\*^$()+?{|]/\\&/g')
          sed -n "/^## \[${VERSION_RE}\]/,/^## \[/{/^## \[${VERSION_RE}\]/p;/^## \[/!p}" CHANGELOG.md > release_notes.md
          if [[ ! -s release_notes.md ]]; then
            echo "::error::Extracted release notes are empty"
            exit 1
          fi
          cat release_notes.md

      - name: Dry run — preview release
        if: inputs.dry_run
        run: |
          echo "::notice::Would run: gh release create v${INPUT_VERSION} --title v${INPUT_VERSION} --notes-file release_notes.md ${{ steps.release-type.outputs.prerelease_flag }}"

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        id: gh-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${INPUT_VERSION}" &>/dev/null; then
            echo "release_status=already_existed" >> "$GITHUB_OUTPUT"
            echo "::notice::GitHub Release v${INPUT_VERSION} already exists — skipping"
          else
            gh release create "v${INPUT_VERSION}" \
              --title "v${INPUT_VERSION}" \
              --notes-file release_notes.md \
              ${{ steps.release-type.outputs.prerelease_flag }}
            echo "release_status=created" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        run: |
          PACKAGE=$(jq -r '.name' package.json)
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "::notice::Dry run complete for ${PACKAGE}@${INPUT_VERSION}. Nothing was published or released."
          elif [[ "${{ steps.gh-release.outputs.release_status }}" == "created" ]]; then
            echo "::notice::Published ${PACKAGE}@${INPUT_VERSION} to npm and created GitHub Release v${INPUT_VERSION}"
          else
            echo "::notice::Published ${PACKAGE}@${INPUT_VERSION} to npm. GitHub Release v${INPUT_VERSION} already existed."
          fi
